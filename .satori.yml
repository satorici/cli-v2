settings:
  name: "Satori CLI V2 Tests"
  log: slack
  image: public.ecr.aws/docker/library/python:3.10-slim-bullseye
  timeout: 3000
  redacted:
    - TOKEN
  example: satori-v2 run ./ -d TOKEN=$SATORI_TOKEN --output --report

import:
  - satori://secrets/semgrep.yml

test:
  assertReturnCode: 0
  assertStderrNotContains: Traceback
  setCommandTimeout: 90
  install:
    - apt update >/dev/null && apt install -qy --no-install-recommends git jq >/dev/null
    - pip install . --disable-pip-version-check --root-user-action=ignore

  # the -P or --profile parameters allows you to use different Satori CI API Tokens
  token_saved:
    create_profile:
      - satori-v2 config token "not_a_token" --profile test_user

    # define the default token for the configuration
    set_token:
      - satori-v2 config token ${{TOKEN}}

    # set default team to run all tests
    set_team:
      - satori-v2 config default_team SatoriCI

    # test setting width via config command
    set_width:
      - satori-v2 config width 145

    # test that width was set correctly
    check_width_set:
      - satori-v2 config width

  import_output:
    check_token:
      setOutput: test.token_saved.set_token
      assertStdoutContains: token updated

  # show the user's dashboard
  dashboard:
    private:
      - satori-v2
    public:
      - satori-v2 --public

  local:
    setParallel: false
    # execute a Satori CI playbook locally and show the report once its done
    local_report:
      - satori-v2 local ./ --playbook .satori/import/pass.yml --report

    # execute a Satori CI playbook locally on a directory with a .satori.yml playbook
    import_sync:
      - satori-v2 local .satori/import

    # execute a public Satori CI playbook locally
    public_output:
      - satori-v2 local ./ --playbook satori://secrets/semgrep.yml --output

    # define inputs on your playbook and execute it with different combination of parameters
    input:
      - satori-v2 local .satori/input.yml --report --output

    datafile:
      - satori-v2 local .satori/datafile.yml -df out=.satori/datafile.txt --report

  wait:
    - echo waiting...

  run:
    setParallel: false
    # execute a Satori CI playbook and show the report once its done with 4 CPUs
    pass_report:
      - satori-v2 run .satori/import/pass.yml --report --cpu 256 --memory 512

    # execute a Satori CI playbook locally on a directory with a .satori.yml playbook
    import_sync:
      - satori-v2 run .satori/import --sync

    # define inputs on your playbook and execute it with different combination of parameters
    input_embedded:
      - satori-v2 run .satori/input.yml --report --output

    # define inputs on your playbook and parametrize it
    input_parametrized:
      - satori-v2 run .satori/ --playbook satori://test.yml -d INPUT=Whatever

  report:
    # run synchronously a local playbook
    new_sync:
      - satori-v2 run .satori/import/pass.yml -s 2>&1 | grep 'Job ' | grep -Eo '[0-9]+' | tr -d '\n'

    execution_id:
      - satori-v2 execution list --job-id ${{test.report.new_sync.stdout}}  --quantity 1 | jq -r '.items[0].id'

    # TODO: fix this test
    # dont_save:
    #   - satori-v2 run .satori/import/pass.yml --delete-report --delete-output --report --output 2>&1 | grep 'Job ' | grep -Eo '[0-9]+' | tr -d '\n'

    # list the reports generated
    list:
      - satori-v2 reports

    search:
      - satori-v2 reports search | tail

    download:
      - satori-v2 reports download --visibility public

    # search the reports running
    filter:
      - satori-v2 reports search --status=running

    parallel:
      setParallel: false

      list_public:
        - satori-v2 reports --public

      # show a report
      single:
        - satori-v2 report ${{test.report.execution_id.stdout}}

      # show a json report
      json:
        - satori-v2 report ${{test.report.execution_id.stdout}} --json

      # make a report public
      public:
        - satori-v2 report ${{test.report.execution_id.stdout}} visibility public

      # show the output associated to a report
      output:
        - satori-v2 report ${{test.report.execution_id.stdout}} output

      # download the files associated to a report
      files:
        - satori-v2 report ${{test.report.execution_id.stdout}} files

      filter_test:
        - satori-v2 report ${{test.report.execution_id.stdout}} output --test tests.positive.echo

      filter_test2:
        - satori-v2 report ${{test.report.execution_id.stdout}} output --test tests.positive.echo.stdout

      filter_format:
        - satori-v2 report ${{test.report.execution_id.stdout}} output --test tests.positive.echo.stdout --format md

    # delete the files, the output and the report
    delete:
      - satori-v2 report ${{test.report.execution_id.stdout}} delete

    # run asynchronously a local playbook
    new_async: # new report for stop is needed because the first one is already stopped
      - satori-v2 run .satori/import/pass.yml 2>&1 | grep 'Report ID' | grep -Eo '[0-9]+' | tr -d '\n'

    # stop a running report
    stop: # wait until start
      - sleep 10; echo ${{test.report.execution_id.stdout}}; satori-v2 report ${{test.report.execution_id.stdout}} stop

  playbook:
    list:
      setParallel: false
      private:
        - satori-v2 playbooks

      monitors:
        - satori-v2 playbooks --monitor true

    public:
      - satori-v2 playbooks --public

    read:
      setParallel: false
      private_playbook_by_report_id:
        - echo ${{test.report.execution_id.stdout}}; satori-v2 playbook ${{test.report.execution_id.stdout}}

      public_playbook:
        - satori-v2 playbook satori://secrets/detect-secrets.yml

    private_playbook_by_id:
      - satori-v2 playbooks --json | jq -r '.[0].id' | tr -d '\n'

    public_flag:
      - satori-v2 playbook ${{test.playbook.private_playbook_by_id.stdout}} visibility public

    # delete_private:
    #   - satori-v2 playbook ${{test.playbook.private_playbook_by_id.stdout.trim()}} delete

  repo:
    # add a new repository to private team
    add_repo:
      - satori-v2 team Private add --repo='satoridev01/hello_world'

    # list the repositories showing to which team they belong, if they are connected to Github CI, info about the playbook and the latest results obtained
    list:
      - satori-v2 repos

    list_public:
      - satori-v2 repos --public

    # list the commits and the reports associated to a repository
    single:
      - satori-v2 repo satoridev01/hello_world

    # simulate a push from the latest version to run the .satori.yml playbook from the repo
    run:
      - satori-v2 repo satoridev01/hello_world run

    # list the commits of a certain repo
    commits:
      - satori-v2 repo satoridev01/hello_world commits

    secrets:
      add:
        - satori-v2 repo satoridev01/hello_world params add var=value

      list:
        - satori-v2 repo satoridev01/hello_world params

      del:
        - satori-v2 repo satoridev01/hello_world params del var

    delete_repo:
      - satori-v2 team Private del --repo='satoridev01/hello_world'

    playbooks:
      parallel:
        setParallel: false

        list:
          - satori-v2 repos playbook list

        single_list:
          - satori-v2 repo satoridev01/Hello_C_World playbook list

      add:
        - satori-v2 repos playbook add satori://test

      del:
        - satori-v2 repos playbook del satori://test

      single_add:
        - satori-v2 repo satoridev01/Hello_C_World playbook add satori://test

      single_del:
        - satori-v2 repo satoridev01/Hello_C_World playbook del satori://test

  monitor:
    # run a new monitor (a playbook with a rate/cron schedule creates a monitor)
    new:
      - satori-v2 run .satori/monitor.yml --json | jq -r '.id'

    # list the monitors
    list:
      - sleep 5; satori-v2 monitors

    list_public:
      - satori-v2 monitors --public

    # list the reports associated to a monitor
    single: # wait until start
      - satori-v2 monitor ${{test.monitor.new.stdout}}

    # make a monitor's reports public
    public: #
      - satori-v2 monitor ${{test.monitor.new.stdout}} visibility public

    # start a monitor
    start:
      - satori-v2 monitor ${{test.monitor.new.stdout}} start

    # pause a monitor
    pause:
      - satori-v2 monitor ${{test.monitor.new.stdout}} pause

    # stop a monitor (alias of pause)
    stop:
      - satori-v2 monitor ${{test.monitor.new.stdout}} stop

    # delete the reports associated to a monitor
    clean:
      - satori-v2 monitor ${{test.monitor.new.stdout}} clean

    # delete the monitor
    delete:
      - satori-v2 monitor ${{test.monitor.new.stdout}} delete

  scan:
    # list the scans
    list:
      - satori-v2 scans

    # list the public scans
    list_public:
      - satori-v2 scans --public

    # Get the commits of a certain repo (required for scans)
    check_commits:
      - satori-v2 scan satoridev01/hello_world check-commits

    # Run the .satori.yml playbook with a certain coverage on the repo
    run:
      - satori-v2 scan satoridev01/hello_world -c 50 | grep 'id:' | grep -Eo '[0-9]+' | tr -d '\n'

    # What's the status of the current scanning
    status:
      - satori-v2 scan ${{test.scan.run.stdout}} status

    # Stop the scan execution
    stop:
      - satori-v2 scan ${{test.scan.run.stdout}} stop

    # Restart a scan execution
    # start:
    #   - satori-v2 scan satoridev01/hello_world start

    # Delete the scan reports
    clean:
      - satori-v2 scan ${{test.scan.run.stdout}} clean

    #delete:
    #  - satori-v2 scan ${{test.scan.run.stdout}} delete

    hccpf:
      - satori-v2 scan satoridev01/hccpf --output

  teams:
    # list teams and repos without teams
    list:
      - satori-v2 teams

    # create team 'test_team'
    create:
      - satori-v2 team test_team create

    parallel:
      setParallel: false
      # list the repos associated to the 'test_team' and their team members
      single:
        - satori-v2 team test_team

      # list the members of the 'test_team'
      members:
        - satori-v2 team test_team members

      # list your TEAM members
      # settings:
      #   - satori-v2 team test_team settings # interactive dont use this

      # list your TEAM settings
      get_config:
        - satori-v2 team test_team get_config notification_email

    # show your TEAM's config setting for a specific value
    set_config:
      - satori-v2 team test_team set_config notification_email info@satori-ci.com
    # set your TEAM CONFIG setting

    # add the email 'info@satori-ci.com' as a member of the team 'test_team'
    add_member:
      - satori-v2 team test_team add --email='info@satori-ci.com'

    # delete the email 'info@satori-ci.com' as a member of the team 'test_team'
    delete_member:
      - satori-v2 team test_team del --email='info@satori-ci.com'

    add_github_member:
      - satori-v2 team test_team add --github='satoridev02'

    delete_github_member:
      - satori-v2 team test_team del --github='satoridev02'

    # add the repo 'satoridev01/hello_world' to the team 'test_team'
    add_repo:
      - satori-v2 team test_team add --repo='satoridev01/hello_world'

    # list the repos associated to the 'test_team'
    team_with_repos:
      - satori-v2 team test_team repos

    # delete the repo 'satoridev01/hello_world' from the team 'test_team'
    del_repo:
      - satori-v2 team test_team del --repo='satoridev01/hello_world'

    # list the repos associated to the 'test_team'
    team_without_repos:
      - satori-v2 team test_team repos

    # delete the 'test_team'
    delete:
      - satori-v2 team test_team delete

  shards:
    - satori-v2 shards --shard 1/10 --input 0.0.0.0/24 --exclude 192.168.0.0/16

  template:
    list:
      - satori-v2 templates

negative_test:
  assertReturnCodeNot: 0
  assertStderrNotContains:
    - Traceback
    - malformed node
    - invalid syntax
    - object has no attribute
    - "codec can\\'t decode byte"

  parallel:
    setParallel: false

    xss:
      assertStdoutNotContains: "XSS_TRIGGERED"
      setSeverity: 1
      test:
        - apt-get install -qy --no-install-recommends chromium chromium-driver >/dev/null
        - pip install selenium -q --disable-pip-version-check --root-user-action=ignore
        - export TOKEN='${{TOKEN}}' && export URL='https://satori.ci/report/riMaEJVGb8kCQF9p/' && python3 xss.py

    repos_playbook_del:
      - satori-v2 repos playbook del

    fail:
      - satori-v2 run .satori/fail.yml --sync

    fail_import:
      - satori-v2 run .satori/fail_import.yml --sync

    empty_playbook:
      - satori-v2 run .satori/empty.yml --report

    empty_playbook_id:
      - satori-v2 playbook

    empty_directory:
      - mkdir test; cd test; satori-v2 run ./

    random:
      - dd if=/dev/urandom of=random_file.yml bs=1024 count=1; satori-v2 run random_file.yml --output

    malformed_or_invalid_json_data:
      - satori-v2 run .satori/empty.yml --data A=B; satori-v2 run .satori/empty.yml -d A=B -d C=D

    deleted_report:
      #- satori-v2 report ${{test.report.dont_save.stdout.trim()}}
      - satori-v2 report ${{test.report.dont_save.stdout}}

    deleted_output:
      #- satori-v2 report ${{test.report.dont_save.stdout.trim()}} output
      - satori-v2 report ${{test.report.dont_save.stdout}} output

    deleted_monitor:
      - satori-v2 monitor ${{test.monitor.new.stdout}}
